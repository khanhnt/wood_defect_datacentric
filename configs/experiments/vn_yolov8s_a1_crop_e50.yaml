experiment_id: vn_yolov8s_a1_crop_e50
description: VNWoodKnot selected augmentation candidate using defect-preserving crop.
dataset:
  key: vnwoodknot
  data_yaml: ${WOOD_DC_VN_A1_DATASET_YAML:-/workspace/data/wood_defect_datacentric/generated_yolo/vnwoodknot/A1_defect_preserving_crop/dataset.yaml}
  split_protocol: existing_vnwoodknot_train_val_test_with_knot_free_retained
transforms:
  preprocessing: P0_baseline
  augmentation: A1_defect_preserving_crop
  materialized_dataset_required: true
training:
  model: yolov8s
  epochs: 50
  imgsz: 1024
  batch: 32
  workers: 4
  seed: 42
  patience: 30
  device: "0"
  optimizer: auto
  pretrained: true
  deterministic: true
  single_cls: false
outputs:
  output_root: results

