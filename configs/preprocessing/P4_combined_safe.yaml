name: P4_combined_safe
method: illumination_plus_mild_clahe
description: "Safe combined preprocessing: clipped luminance gamma followed by mild luminance-only CLAHE."
params:
  illumination:
    target_luminance: 0.50
    gamma_min: 0.90
    gamma_max: 1.12
  clahe:
    clip_limit: 1.3
    tile_grid_size: 8
    blend: 0.45
sanity:
  preserve_dimensions: true
  preserve_labels: true
