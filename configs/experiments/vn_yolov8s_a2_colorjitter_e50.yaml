experiment_id: vn_yolov8s_a2_colorjitter_e50
description: VNWoodKnot target-domain experiment with A2 texture-aware color jitter materialized dataset.
dataset:
  key: vnwoodknot
  data_yaml: ${WOOD_DC_VN_A2_DATASET_YAML:-/workspace/data/wood_defect_datacentric/generated_yolo/vnwoodknot/A2_texture_aware_color_jitter/dataset.yaml}
  split_protocol: existing_vnwoodknot_train_val_test_with_knot_free_retained
transforms:
  preprocessing: P0_baseline
  augmentation: A2_texture_aware_color_jitter
  materialized_dataset_required: true
training:
  model: yolov8s
  epochs: 50
  imgsz: ${IMG_SIZE:-1024}
  batch: ${BATCH_SIZE:-32}
  workers: ${WORKERS:-4}
  seed: 42
  patience: 30
  device: "${DEVICE:-0}"
  optimizer: auto
  pretrained: true
  deterministic: true
  single_cls: false
outputs:
  output_root: results
