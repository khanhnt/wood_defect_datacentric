experiment_id: vsb_yolov8s_a2_colorjitter_e50
description: VSB curated benchmark with A2 texture-aware color jitter materialized dataset.
dataset:
  key: vsb_curated
  data_yaml: ${WOOD_DC_VSB_A2_DATASET_YAML:-/workspace/data/wood_defect_datacentric/generated_yolo/vsb/A2_texture_aware_color_jitter/dataset.yaml}
  split_protocol: existing_curated_train_val_test
transforms:
  preprocessing: P0_baseline
  augmentation: A2_texture_aware_color_jitter
