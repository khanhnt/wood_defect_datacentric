project:
  name: wood_defect_datacentric
  seed: 42
  detector: yolov8s
  image_size: 1024

paths:
  vsb_manifest_path: data/processed/large_scale_wood_surface_defects_manifest.jsonl
  vsb_processed_root: ""
  vsb_curated_yolo_root: ""
  vnwoodknot_manifest_path: data/processed/vnwoodknot_manifest.jsonl
  vnwoodknot_processed_root: ""
  vnwoodknot_yolo_root: ""
  output_root: results
  docs_root: docs

datasets:
  vsb_curated:
    name: large_scale_wood_surface_defects_vsb7_3600_rare_first
    classes:
      - live_knot
      - dead_knot
      - resin
      - knot_with_crack
      - crack
      - marrow
      - knot_missing
    split:
      train: train
      val: val
      test: test
  vnwoodknot:
    name: vnwoodknot
    positive_classes:
      - live_knot
      - dead_knot
    negative_class: knot_free
    split:
      train: train
      val: val
      test: test

training:
  epochs: 50
  batch: 32
  workers: 4
  patience: 30
  device: "0"

evaluation:
  score_thresholds:
    - 0.05
    - 0.10
    - 0.25
    - 0.50
  iou_threshold: 0.50
  max_detections: 100
  negative_metrics:
    enabled: true
    negative_source_category: knot_free

preprocessing:
  variants:
    P0_baseline:
      enabled: true
    P1_CLAHE_luminance:
      enabled: true
      clip_limit: 1.5
      tile_grid_size: 8
      blend: 0.50
    P2_illumination_normalization:
      enabled: true
      target_luminance: 0.50
      gamma_min: 0.85
      gamma_max: 1.18
    P3_mild_unsharp:
      enabled: true
      sigma: 1.0
      amount: 0.25
    P4_combined_safe:
      enabled: true
      illumination:
        target_luminance: 0.50
        gamma_min: 0.90
        gamma_max: 1.12
      clahe:
        clip_limit: 1.3
        tile_grid_size: 8
        blend: 0.45

augmentation:
  variants:
    A0_default:
      enabled: true
      use_ultralytics_defaults: true
    A1_defect_preserving_crop:
      enabled: true
      min_box_visibility: 0.90
      context_scale: 2.25
      min_crop_scale: 0.62
    A2_texture_aware_color_jitter:
      enabled: true
      brightness: 0.10
      contrast: 0.10
      saturation: 0.06
    A3_copy_paste_defects:
      enabled: true
      experimental: true
      max_objects_per_image: 2
      max_iou_with_existing: 0.05
    A4_combined_best:
      enabled: true
      crop:
        min_box_visibility: 0.92
        context_scale: 2.35
        min_crop_scale: 0.66
      color_jitter:
        brightness: 0.08
        contrast: 0.08
        saturation: 0.05
