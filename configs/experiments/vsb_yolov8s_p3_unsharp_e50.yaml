experiment_id: vsb_yolov8s_p3_unsharp_e50
description: VSB curated benchmark with P3 mild unsharp masking materialized dataset.
dataset:
  key: vsb_curated
  data_yaml: ${WOOD_DC_VSB_P3_DATASET_YAML:-/workspace/data/wood_defect_datacentric/generated_yolo/vsb/P3_mild_unsharp/dataset.yaml}
  split_protocol: existing_curated_train_val_test
transforms:
  preprocessing: P3_mild_unsharp
  augmentation: A0_default
  materialized_dataset_required: true
training:
