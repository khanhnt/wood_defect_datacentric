experiment_id: vn_yolov8s_p4_a4_combined_e50
description: VNWoodKnot combined safe data-centric pipeline using P4 preprocessing and A4 augmentation.
dataset:
  key: vnwoodknot
  data_yaml: ${WOOD_DC_VN_P4_A4_DATASET_YAML:-/workspace/data/wood_defect_datacentric/generated_yolo/vnwoodknot/P4_combined_safe__A4_combined_best/dataset.yaml}
  split_protocol: existing_vnwoodknot_train_val_test_with_knot_free_retained
transforms:
  preprocessing: P4_combined_safe
  augmentation: A4_combined_best
  materialized_dataset_required: true
training:
  model: yolov8s
  epochs: 50
  imgsz: ${IMG_SIZE:-1024}
  batch: ${BATCH_SIZE:-32}
  workers: ${WORKERS:-4}
  seed: 42
  patience: 30
  device: "${DEVICE:-0}"
  optimizer: auto
  pretrained: true
  deterministic: true
  single_cls: false
outputs:
  output_root: results

